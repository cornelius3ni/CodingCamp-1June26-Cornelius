<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Personal Dashboard</title>
  <link rel="stylesheet" href="css/dashboard.css" />
</head>
<body>

  <!-- Theme toggle -->
  <button id="theme-toggle" aria-label="Toggle dark mode">🌙 Dark</button>

  <div class="dashboard">

    <!-- Greeting -->
    <section id="greeting-section" class="card">
      <div id="name-row">
        <span id="name-display">✏️ Set your name</span>
      </div>
      <div id="name-edit-row">
        <input type="text" id="name-input" placeholder="Your name…" maxlength="40" />
        <button class="btn-primary"   id="btn-save-name"   style="padding:6px 14px;font-size:0.82rem;">Save</button>
        <button class="btn-secondary" id="btn-cancel-name" style="padding:6px 14px;font-size:0.82rem;">Cancel</button>
      </div>
      <div id="clock">00:00:00</div>
      <div id="date-display">Loading…</div>
      <div id="greeting-text">Hello</div>
    </section>

    <!-- Focus Timer -->
    <section id="timer-section" class="card">
      <div class="section-title">Focus Timer</div>
      <div id="timer-display">25:00</div>
      <div class="timer-controls">
        <button id="btn-start" class="btn-primary">Start</button>
        <button id="btn-stop"  class="btn-secondary" disabled>Stop</button>
        <button id="btn-reset" class="btn-secondary">Reset</button>
      </div>
    </section>

    <!-- Tasks -->
    <section id="todo-section" class="card">
      <div class="section-title">Tasks</div>
      <div class="input-row">
        <input type="text" id="todo-input" placeholder="Add a new task…" />
        <button id="btn-add-task" class="btn-primary">Add</button>
      </div>
      <p class="error-msg" id="todo-error"></p>
      <ul id="todo-list"></ul>
    </section>

    <!-- Quick Links -->
    <section id="quicklinks-section" class="card">
      <div class="section-title">Quick Links</div>
      <div class="links-input-row">
        <input type="text" id="link-label-input" placeholder="Link name" />
        <input type="url"  id="link-url-input"   placeholder="URL" />
        <button id="btn-add-link" class="btn-primary">Add Link</button>
      </div>
      <p class="error-msg" id="links-error"></p>
      <ul id="links-list"></ul>
    </section>

  </div>

  <script src="js/dashboard.js"></script>
</body>
</html>
